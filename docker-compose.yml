services:
  db:
    image: mysql:8.0
    container_name: office-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: office_db
    ports:
      - "3306:3306"  # So you can use SQL tools on your laptop
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: office-app
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://db:3306/office_db